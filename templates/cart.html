{% extends 'base.html' %}
{% block content %}
<h2>Your Cart</h2>
{% if cart %}
<ul class="list-group">
    {% for item in cart %}
    <li class="list-group-item bg-dark text-light">{{ item.name }} - ₹{{ item.price }}</li>
    {% endfor %}
</ul>
{% else %}
<p>Your cart is empty.</p>
{% endif %}
{% endblock %}
