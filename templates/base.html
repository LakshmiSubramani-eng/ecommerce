<!doctype html>
<html lang="en">

<head>
    <title>Mini Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <nav class="navbar navbar-dark bg-dark p-3">
        <a class="navbar-brand" href="{{ url_for('home') }}">Mini Shop</a>
        {% if session.get('username') %}
        <span class="text-light">Welcome, {{ session['username'] }}</span>
        <a href="{{ url_for('cart') }}" class="btn btn-outline-light ms-2">Cart</a>
        {% else %}
        <a href="{{ url_for('login') }}" class="btn btn-outline-light">Login</a>
        {% endif %}
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
</body>

</html>
