{% extends 'base.html' %}
{% block content %}
<h2>Products</h2>
<div class="row">
    {% for p in products %}
    <div class="col-md-4">
        <div class="card mb-3">
            <img src="{{ p.image }}" class="card-img-top" alt="{{ p.name }}">
            <div class="card-body">
                <h5 class="card-title">{{ p.name }}</h5>
                <p class="card-text">{{ p.description }}</p>
                <p>₹{{ p.price }}</p>
                <a href="{{ url_for('add_to_cart', product_id=p.id) }}" class="btn btn-primary">Add to Cart</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
